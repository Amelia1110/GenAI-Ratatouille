[platformio]
extra_configs = credentials.ini

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.partitions = huge_app.csv

monitor_speed = 115200
upload_speed = 460800
monitor_rts = 0
monitor_dtr = 0

build_flags =
    ${esp32cam_secrets.build_flags}   ; pull in the credentials

lib_deps =
    espressif/esp32-camera

[env:esp32cam-ptt]
platform = espressif32
board = esp32cam
framework = arduino

board_build.mcu = esp32
board_build.f_cpu = 240000000L

monitor_speed = 115200
upload_speed = 460800
monitor_rts = 0
monitor_dtr = 0

build_flags =
    ${esp32cam_secrets.build_flags}
    -DENABLE_PTT_TRIGGER_SKETCH

src_filter =
    +<*>
    -<main.cpp>
